<title>Edvard Kuryla</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100vw;height:100vh;
  background:#050505;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

canvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:0;
}

.wrap{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;
  animation:up 1.2s cubic-bezier(.16,1,.3,1) both;
}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.name-block{
  text-align:center;
  margin-bottom:44px;
  line-height:1;
}
.first{
  display:block;
  font-family:'Cormorant Garamond',serif;
  font-style:normal;
  font-weight:300;
  font-size:clamp(58px,11vw,130px);
  letter-spacing:.2em;
  text-transform:uppercase;
  color:#b8a96e;
  line-height:.95;
}
.last{
  display:block;
  font-family:'Cormorant Garamond',serif;
  font-style:normal;
  font-weight:300;
  font-size:clamp(58px,11vw,130px);
  letter-spacing:.2em;
  text-transform:uppercase;
  color:#eeeeee;
  line-height:.95;
}
.role{
  display:block;
  margin-top:16px;
  font-family:'DM Sans',sans-serif;
  font-weight:300;
  font-size:clamp(7px,.9vw,10px);
  letter-spacing:.65em;
  text-transform:uppercase;
  color:rgba(184,169,110,0.6);
}

.divider{
  width:1px;height:36px;
  background:linear-gradient(to bottom,rgba(184,169,110,0.5),transparent);
  margin-bottom:32px;
}

.links{
  display:flex;gap:14px;
}
.link{
  width:50px;height:50px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.1);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;
  position:relative;
  transition:border-color .3s,transform .4s cubic-bezier(.16,1,.3,1);
  animation:up .7s cubic-bezier(.16,1,.3,1) both;
}
.link:nth-child(1){animation-delay:.2s}
.link:nth-child(2){animation-delay:.28s}
.link:nth-child(3){animation-delay:.36s}
.link:nth-child(4){animation-delay:.44s}
.link svg{width:17px;height:17px;fill:rgba(190,190,190,0.5);transition:fill .3s;position:relative;z-index:1}
.link::before{content:'';position:absolute;inset:0;border-radius:50%;background:rgba(184,169,110,0);transition:background .3s}
.link:hover{border-color:rgba(184,169,110,0.7);transform:translateY(-5px)}
.link:hover::before{background:rgba(184,169,110,0.1)}
.link:hover svg{fill:rgba(184,169,110,0.95)}
.link::after{
  content:attr(data-label);
  position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);
  font-family:'DM Sans',sans-serif;font-weight:300;
  font-size:8px;letter-spacing:.3em;text-transform:uppercase;
  color:rgba(184,169,110,0);white-space:nowrap;transition:color .3s;
}
.link:hover::after{color:rgba(184,169,110,0.55)}

.corner{position:fixed;width:22px;height:22px;opacity:.15}
.corner.tl{top:26px;left:26px;border-top:1px solid #b8a96e;border-left:1px solid #b8a96e}
.corner.tr{top:26px;right:26px;border-top:1px solid #b8a96e;border-right:1px solid #b8a96e}
.corner.bl{bottom:26px;left:26px;border-bottom:1px solid #b8a96e;border-left:1px solid #b8a96e}
.corner.br{bottom:26px;right:26px;border-bottom:1px solid #b8a96e;border-right:1px solid #b8a96e}
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>

<script>
(function(){
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W, H;
  var NODES = 55;
  var CONNECT_DIST = 160;
  var nodes = [];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Init nodes
  for(var i=0;i<NODES;i++){
    nodes.push({
      x: Math.random()*window.innerWidth,
      y: Math.random()*window.innerHeight,
      vx: (Math.random()-.5)*0.35,
      vy: (Math.random()-.5)*0.35,
      r:  Math.random()*1.4 + 0.5,
      pulse: Math.random()*Math.PI*2
    });
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    var t = Date.now()*0.001;

    // Draw edges
    for(var i=0;i<nodes.length;i++){
      for(var j=i+1;j<nodes.length;j++){
        var dx = nodes[j].x - nodes[i].x;
        var dy = nodes[j].y - nodes[i].y;
        var dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < CONNECT_DIST){
          var alpha = (1 - dist/CONNECT_DIST) * 0.18;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = 'rgba(184,155,80,'+alpha+')';
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }

    // Draw nodes (stars — 4-point cross)
    for(var i=0;i<nodes.length;i++){
      var n = nodes[i];
      var pulse = 0.7 + 0.3*Math.sin(t*1.2 + n.pulse);
      var r = n.r * pulse;
      var alpha = 0.35 + 0.45*Math.sin(t*0.8 + n.pulse);

      ctx.save();
      ctx.translate(n.x, n.y);
      ctx.fillStyle = 'rgba(210,175,90,'+alpha+')';

      // 4-point star
      ctx.beginPath();
      var s = r * 2.2;
      ctx.moveTo(0, -s);
      ctx.lineTo(r*0.3, -r*0.3);
      ctx.lineTo(s, 0);
      ctx.lineTo(r*0.3, r*0.3);
      ctx.lineTo(0, s);
      ctx.lineTo(-r*0.3, r*0.3);
      ctx.lineTo(-s, 0);
      ctx.lineTo(-r*0.3, -r*0.3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // Move
      n.x += n.vx;
      n.y += n.vy;
      if(n.x < -20) n.x = W+20;
      if(n.x > W+20) n.x = -20;
      if(n.y < -20) n.y = H+20;
      if(n.y > H+20) n.y = -20;
    }

    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
